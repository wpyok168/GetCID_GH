<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微软确认ID获取工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #f7f8fa;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        .container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1f2937;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }

        textarea, input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }

        textarea:focus, input:focus {
            border-color: #0078d4;
            box-shadow: 0 0 0 2px rgba(0,120,212,0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #0086e5;
        }

        .btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .result-box {
            min-height: 120px;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            font-size: 13px;
        }

        .status {
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
            color: #4b5563;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            z-index: 999;
            opacity: 0;
            transition: 0.3s;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">微软确认 ID 获取工具</div>

    <div class="form-group">
        <label>IID 安装 ID</label>
        <textarea id="iidInput" rows="3" placeholder="请粘贴 54 位或 63 位纯数字 IID 安装 ID"></textarea>
    </div>

    <button class="btn" id="getBtn">获取确认 ID</button>

    <div class="status" id="status">就绪</div>

    <div class="form-group">
        <label>获取结果</label>
        <textarea readonly class="result-box" id="resultBox" placeholder="获取结果将显示在这里"></textarea>
    </div>

    <button class="btn" id="copyBtn" disabled>复制结果</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ========================= 工具函数 =========================
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function cleanIID(str) {
    return (str || "").replace(/[^0-9]/g, "");
}

// ========================= IID 校验（和你脚本完全一致） =========================
function checkBlock(block) {
    if (!/^\d+$/.test(block) || block.length < 2) return false;
    const check = Number(block.at(-1));
    let sum = 0;
    for (let i = 0; i < block.length - 1; i++) {
        const d = Number(block[i]);
        sum += i % 2 === 0 ? d : d * 2;
    }
    return sum % 7 === check;
}

function validateIID(iid) {
    if (!/^\d+$/.test(iid)) return { valid: false, error: "not_numeric" };
    if (iid.length !== 54 && iid.length !== 63) return { valid: false, error: "invalid_length" };
    const blockSize = iid.length / 9;
    const failed = [];
    for (let i = 0; i < 9; i++) {
        const b = iid.slice(i * blockSize, (i + 1) * blockSize);
        if (!checkBlock(b)) failed.push(i + 1);
    }
    return { valid: failed.length === 0, failedBlocks: failed };
}

// ========================= DPoP 生成（原版逻辑） =========================
function eI(t) {
    let e = t instanceof ArrayBuffer ? new Uint8Array(t) : new TextEncoder().encode(t);
    let n = "";
    for (let o of e) n += String.fromCharCode(o);
    return btoa(n).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

let tI = null;
async function yT() {
    if (!tI) {
        tI = await crypto.subtle.generateKey({ name: "ECDSA", namedCurve: "P-256" }, true, ["sign", "verify"]);
    }
    return tI;
}

async function c1e(t, e) {
    const { privateKey, publicKey } = await yT();
    const jwk = await crypto.subtle.exportKey("jwk", publicKey);
    const header = { alg: "ES256", typ: "dpop+jwt", jwk };
    const payload = { htu: t, htm: e, jti: crypto.randomUUID(), iat: Math.floor(Date.now() / 1000) };
    const u = `${eI(JSON.stringify(header))}.${eI(JSON.stringify(payload))}`;
    const sig = await crypto.subtle.sign({ name: "ECDSA", hash: "SHA-256" }, privateKey, new TextEncoder().encode(u));
    return `${u}.${eI(sig)}`;
}

async function testGenerateDPoP() {
    return await c1e("https://visualsupport.microsoft.com/api/productActivation/validateIID", "POST");
}

// ========================= 生成 SessionID =========================
function GenerateSessionId() {
    const t = Date.now().toString(36);
    const e = Math.random().toString(36).substr(2, 9);
    return `app_${t}_${e}`;
}

// ========================= 核心：发送激活请求 =========================
async function sendActivationRequest(iid) {
    const dpop = await testGenerateDPoP();
    const digits = Math.floor(iid.length / 9);
    const sid = GenerateSessionId();

    const res = await fetch("https://visualsupport.microsoft.com/api/productActivation/validateIID", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer govUrlID`,
            "DPoP": dpop,
            "X-Session-Id": sid,
        },
        body: JSON.stringify({
            IID: iid,
            ProductType: "windows",
            productGroup: "Windows",
            productName: "Windows 11",
            numberOfDigits: digits,
            Country: "CHN",
            Region: "APGC",
            InstalledDevices: 1,
            OverrideStatusCode: "MUL",
            InitialReasonCode: "45164"
        })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message || "请求失败");
    return data;
}

// ========================= 页面交互 =========================
const $ = id => document.getElementById(id);
const iidInput = $("iidInput");
const getBtn = $("getBtn");
const resultBox = $("resultBox");
const copyBtn = $("copyBtn");
const status = $("status");

getBtn.addEventListener("click", async () => {
    try {
        getBtn.disabled = true;
        getBtn.textContent = "处理中...";
        status.textContent = "校验 IID...";

        const raw = iidInput.value.trim();
        const iid = cleanIID(raw);
        const check = validateIID(iid);

        if (!check.valid) {
            if (check.error === "not_numeric") toast("IID 必须是纯数字");
            else if (check.error === "invalid_length") toast("长度必须是 54/63 位");
            else toast(`第 ${check.failedBlocks.join(",")} 区块校验失败`);
            throw new Error("IID 不合法");
        }

        status.textContent = "生成 DPoP...";
        const result = await sendActivationRequest(iid);

        resultBox.value = JSON.stringify(result, null, 2);
        copyBtn.disabled = false;
        toast("获取成功！");
        status.textContent = "✅ 成功";
    } catch (err) {
        toast("错误：" + err.message);
        status.textContent = "❌ " + err.message.slice(0, 20);
    } finally {
        getBtn.disabled = false;
        getBtn.textContent = "获取确认 ID";
    }
});

copyBtn.addEventListener("click", () => {
    resultBox.select();
    document.execCommand("copy");
    toast("已复制结果");
});
</script>

</body>
</html>
