<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微软确认ID获取工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #f7f8fa;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        .container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1f2937;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }

        textarea, input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }

        textarea:focus, input:focus {
            border-color: #0078d4;
            box-shadow: 0 0 0 2px rgba(0,120,212,0.2);
        }

        /* 按钮横向布局容器 */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        /* 基础按钮样式 */
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        /* 获取按钮：占 2/3 宽度 */
        .btn-get {
            flex: 2;
            background: #0078d4;
            color: white;
        }

        /* 清空按钮：占 1/3 宽度 */
        .btn-clear {
            flex: 1;
            background: #6b7280;
            color: white;
        }

        .btn-get:hover {
            background: #0086e5;
        }
        .btn-clear:hover {
            background: #4b5563;
        }

        .btn-get:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        /* 底部复制按钮 */
        .btn-full {
            width: 100%;
            padding: 12px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s;
        }
        .btn-full:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        /* 结果框高度 */
        .result-box {
            min-height: 250px;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            font-size: 13px;
        }

        .status {
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
            color: #4b5563;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            z-index: 999;
            opacity: 0;
            transition: 0.3s;
            font-size: 14px;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">微软确认 ID 获取工具</div>

    <div class="form-group">
        <label>IID 安装 ID</label>
        <textarea id="iidInput" rows="3" placeholder="请粘贴 54 位或 63 位纯数字 IID 安装 ID"></textarea>
    </div>

    <!-- 按钮横向排列：获取2/3 + 清空1/3 -->
    <div class="btn-row">
        <button class="btn btn-get" id="getBtn">获取确认 ID</button>
        <button class="btn btn-clear" id="clearBtn">清空</button>
    </div>

    <div class="status" id="status">✅ 就绪</div>

    <div class="form-group">
        <label>获取结果</label>
        <textarea readonly class="result-box" id="resultBox" rows="15" placeholder="获取结果将显示在这里"></textarea>
    </div>

    <button class="btn-full" id="copyBtn" disabled>复制结果</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ==============================================
// 🚀 只需要修改这里为你的 Cloudflare 代理地址
// ==============================================
const PROXY_URL = "https://msc.x2ray.cfd/";

// ========================= 工具函数 =========================
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ========================= 页面交互逻辑 =========================
const $ = id => document.getElementById(id);
const iidInput = $("iidInput");
const getBtn = $("getBtn");
const clearBtn = $("clearBtn");
const resultBox = $("resultBox");
const copyBtn = $("copyBtn");
const status = $("status");

// 清空按钮：清空两个文本框 + 重置状态
clearBtn.addEventListener("click", () => {
    iidInput.value = "";
    resultBox.value = "";
    copyBtn.disabled = true;
    status.textContent = "✅ 就绪";
    toast("🗑️ 已清空所有内容");
});

// 获取确认ID
getBtn.addEventListener("click", async () => {
    try {
        getBtn.disabled = true;
        getBtn.textContent = "处理中...";
        status.textContent = "🔍 校验 IID...";

        // 清洗 IID（只保留数字）
        const raw = iidInput.value.trim();
        const iid = raw.replace(/[^0-9]/g, "");

        // 基础校验
        if (!iid) {
            toast("❌ 请输入有效的 IID");
            throw new Error("IID 为空");
        }
        if (iid.length !== 54 && iid.length !== 63) {
            toast("❌ IID 必须是 54/63 位");
            throw new Error("长度错误");
        }

        status.textContent = "📡 发送请求中...";

        // 前端只发送 IID，所有逻辑在 Cloudflare 完成
        const res = await fetch(PROXY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ IID: iid })
        });

        const result = await res.json();

        if (!res.ok) {
            throw new Error(result.error || "请求失败");
        }

        // 成功
        resultBox.value = JSON.stringify(result, null, 2);
        copyBtn.disabled = false;
        toast("✅ 获取成功！");
        status.textContent = "✅ 完成";

    } catch (err) {
        toast("❌ 错误：" + err.message);
        status.textContent = "❌ 失败";
        console.error(err);
    } finally {
        getBtn.disabled = false;
        getBtn.textContent = "获取确认 ID";
    }
});

// 复制结果
copyBtn.addEventListener("click", () => {
    resultBox.select();
    navigator.clipboard.writeText(resultBox.value).then(() => {
        toast("📋 已复制到剪贴板");
    });
});
</script>

</body>
</html>
