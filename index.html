<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微软确认ID获取工具</title>
    <style>
        :root {
            --primary: #0078d4;
            --primary-hover: #005a9e;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
            --border: #e5e7eb;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(0, 120, 212, 0.05) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(0, 120, 212, 0.05) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-main);
            transition: all 0.2s;
            background: #f9fafb;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 120, 212, 0.1);
        }

        /* 按钮横向布局容器 */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

	/* 基础按钮样式 */
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.97);
        }
	 /* 获取按钮：占 2/3 宽度 */
        .btn-get {
            flex: 2;
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 120, 212, 0.3);
        }

        .btn-get:hover {
            background: var(--primary-hover);
            box-shadow: 0 10px 15px -3px rgba(0, 120, 212, 0.4);
        }
	/* 清空按钮：占 1/3 宽度 */
        .btn-clear {
            flex: 1;
            background: #f3f4f6;
            color: #4b5563;
        }

        .btn-clear:hover {
            background: #e5e7eb;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 状态指示器 */
        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            background: #f3f4f6;
            color: var(--text-sub);
            transition: all 0.3s;
        }

        .status-pill.loading { background: #eff6ff; color: var(--primary); }
        .status-pill.success { background: #ecfdf5; color: var(--success); }
        .status-pill.error { background: #fef2f2; color: var(--error); }

        /* 结果区域 */
        .result-container {
            margin-top: 8px;
            position: relative;
        }

        .cid-display {
            background: #f8fafc;
            border: 2px dashed var(--primary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            display: none; /* 默认隐藏 */
        }

        .cid-text {
            font-family: "Consolas", monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 2px;
            word-break: break-all;
        }

        .result-box {
            min-height: 200px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 13px;
            background: #1e293b;
            color: #e2e8f0;
            border: none;
        }

        .btn-copy {
            width: 100%;
            background: #1e293b;
            color: white;
            margin-top: 16px;
        }

        .btn-copy:hover { background: #0f172a; }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 99px;
            font-size: 14px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 1000;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 480px) {
            .container { padding: 24px; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">微软确认 ID 获取工具</div>
        <div class="subtitle">Microsoft Activation Confirmation ID Tool</div>
    </div>

    <div class="form-group">
        <label>IID 安装 ID (54位或63位)</label>
        <textarea id="iidInput" rows="3" placeholder="在此粘贴数字..."></textarea>
    </div>

    <div class="btn-row">
        <button class="btn btn-get" id="getBtn">
            <span>🚀</span> 立即获取 CID
        </button>
        <button class="btn btn-clear" id="clearBtn">清空</button>
    </div>

    <div style="text-align: center;">
        <div class="status-pill" id="statusPill">就绪</div>
    </div>

    <div class="result-container">
        <div class="cid-display" id="cidDisplay">
            <div style="font-size: 12px; color: var(--text-sub); margin-bottom: 5px;">提取确认 ID (CID):</div>
            <div class="cid-text" id="cidText"></div>
        </div>

        <label>详细原始响应</label>
        <textarea readonly class="result-box" id="resultBox" placeholder="等待数据返回..."></textarea>
    </div>

    <button class="btn btn-copy" id="copyBtn" disabled>复制详细结果</button>
</div>

<div class="toast" id="toast">已复制到剪贴板</div>

<script>
// ==============================================
// 🚀 代理地址
// ==============================================
const PROXY_URL = "https://msc.x2ray.cfd/";

// ========================= 工具函数 =========================
const $ = id => document.getElementById(id);
const iidInput = $("iidInput");
const getBtn = $("getBtn");
const clearBtn = $("clearBtn");
const resultBox = $("resultBox");
const copyBtn = $("copyBtn");
const statusPill = $("statusPill");
const cidDisplay = $("cidDisplay");
const cidText = $("cidText");

function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function updateStatus(text, type = '') {
    statusPill.textContent = text;
    statusPill.className = 'status-pill ' + type;
}

// ========================= 逻辑处理 =========================

clearBtn.addEventListener("click", () => {
    iidInput.value = "";
    resultBox.value = "";
    cidDisplay.style.display = 'none';
    copyBtn.disabled = true;
    updateStatus("就绪");
    showToast("🗑️ 已重置内容");
});

getBtn.addEventListener("click", async () => {
    try {
        const raw = iidInput.value.trim();
        const iid = raw.replace(/[^0-9]/g, "");

        if (!iid || (iid.length !== 54 && iid.length !== 63)) {
            updateStatus("输入位数不正确", "error");
            return showToast("❌ 请输入 54 或 63 位数字");
        }

        getBtn.disabled = true;
        updateStatus("正在联络微软服务器...", "loading");
        cidDisplay.style.display = 'none';

        const res = await fetch(PROXY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ IID: iid })
        });

        const result = await res.json();

        if (!res.ok) throw new Error(result.error || "请求失败");

        // 显示原始结果
        resultBox.value = JSON.stringify(result, null, 2);
        
        // 尝试智能提取 CID
        // 根据微软返回结构提取，通常在 data.ConfirmationId 或类似位置
        let cid = "";
        if (result.data && result.data.ConfirmationId) {
            cid = result.data.ConfirmationId;
        } else if (result.data && result.data.message) {
            // 有些接口直接在 message 里
            cid = result.data.message;
        }

        if (cid && /^\d+$/.test(cid)) {
            cidDisplay.style.display = 'block';
            cidText.textContent = cid;
        }

        updateStatus("成功获取确认 ID", "success");
        copyBtn.disabled = false;
        showToast("✅ 获取成功");

    } catch (err) {
        updateStatus("获取失败", "error");
        resultBox.value = "错误详情: " + err.message;
        showToast("❌ 发生错误");
    } finally {
        getBtn.disabled = false;
    }
});

copyBtn.addEventListener("click", () => {
    // 优先复制 CID，如果没有则复制 JSON
    const textToCopy = cidText.textContent || resultBox.value;
    navigator.clipboard.writeText(textToCopy).then(() => {
        showToast("📋 复制成功");
    });
});
</script>

</body>
</html>
