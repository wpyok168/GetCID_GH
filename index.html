<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微软确认 ID 获取工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f1ff 0%, #f0f7ff 100%);
            min-height: 100vh;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #ffffff;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 120, 212, 0.1);
            width: 100%;
            border: 1px solid rgba(0, 120, 212, 0.08);
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 28px;
            color: #1e293b;
            text-align: center;
            letter-spacing: 0.3px;
            position: relative;
        }

        .title::after {
            content: "";
            display: block;
            width: 50px;
            height: 4px;
            background: #0078d4;
            border-radius: 2px;
            margin: 10px auto 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #334155;
            font-size: 15px;
        }

        textarea, input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            resize: vertical;
            outline: none;
            transition: all 0.25s ease;
            background: #fafbfc;
        }

        textarea:focus, input:focus {
            border-color: #0078d4;
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.15);
            background: #ffffff;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-get {
            flex: 2;
            background: #0078d4;
            color: white;
        }

        .btn-clear {
            flex: 1;
            background: #64748b;
            color: white;
        }

        .btn-get:hover {
            background: #0086e5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.2);
        }

        .btn-clear:hover {
            background: #475569;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.15);
        }

        .btn-get:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-full {
            width: 100%;
            padding: 14px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.25s ease;
        }

        .btn-full:hover {
            background: #0086e5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.2);
        }

        .btn-full:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-box {
            min-height: 260px;
            white-space: pre-wrap;
            font-family: Consolas, "Courier New", monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        .status {
            text-align: center;
            margin: 12px 0;
            font-size: 15px;
            color: #059669;
            font-weight: 500;
            min-height: 22px;
        }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 999;
            opacity: 0;
            transition: all 0.3s ease;
            font-size: 15px;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .toast.show {
            opacity: 1;
            top: 32px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 20px;
            }
            .title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">微软确认 ID 获取工具</div>

    <div class="form-group">
        <label>IID 安装 ID</label>
        <textarea id="iidInput" rows="3" placeholder="请粘贴 54 位或 63 位纯数字 IID 安装 ID"></textarea>
    </div>

    <div class="btn-row">
        <button class="btn btn-get" id="getBtn">获取确认 ID</button>
        <button class="btn btn-clear" id="clearBtn">清空</button>
    </div>

    <div class="status" id="status">✅ 就绪</div>

    <div class="form-group">
        <label>获取结果</label>
        <textarea readonly class="result-box" id="resultBox" rows="15" placeholder="获取结果将显示在这里"></textarea>
    </div>

    <button class="btn-full" id="copyBtn" disabled>复制结果</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ==============================================
// 🚀 只需要修改这里为你的 Cloudflare 代理地址
// ==============================================
const PROXY_URL = "https://msc.x2ray.cfd/";

// ========================= 你要的 IID 区块校验函数 =========================
/**
 * 校验IID区块合法性
 * @param {string} block - IID的单个区块
 * @returns {boolean} 区块是否合法
 */
function checkBlock(block) {
    if (!/^\d+$/.test(block) || block.length < 2) return false;

    const check = Number(block.at(-1));
    let sum = 0;

    for (let i = 0; i < block.length - 1; i++) {
        const d = Number(block[i]);
        sum += i % 2 === 0 ? d : d * 2;
    }

    return sum % 7 === check;
}

/**
 * 校验整个IID的合法性（增强版，返回具体错误信息）
 * @param {string} iid - 待校验的IID字符串
 * @returns {object} 校验结果 {valid: boolean, error?: string, failedBlocks?: array}
 */
function validateIID(iid) {
    if (!/^\d+$/.test(iid))
        return { valid: false, error: "not_numeric" };

    if (iid.length !== 54 && iid.length !== 63)
        return { valid: false, error: "invalid_length", length: iid.length };

    const blockSize = iid.length / 9;
    const failedBlocks = [];

    for (let i = 0; i < 9; i++) {
        const block = iid.slice(i * blockSize, (i + 1) * blockSize);
        if (!checkBlock(block)) {
            failedBlocks.push({ index: i + 1, value: block });
        }
    }

    return { valid: failedBlocks.length === 0, failedBlocks };
}

// ========================= 工具函数 =========================
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ========================= 页面交互逻辑 =========================
const $ = id => document.getElementById(id);
const iidInput = $("iidInput");
const getBtn = $("getBtn");
const clearBtn = $("clearBtn");
const resultBox = $("resultBox");
const copyBtn = $("copyBtn");
const status = $("status");

clearBtn.addEventListener("click", () => {
    iidInput.value = "";
    resultBox.value = "";
    copyBtn.disabled = true;
    status.textContent = "✅ 就绪";
    toast("🗑️ 已清空所有内容");
});

getBtn.addEventListener("click", async () => {
    try {
        getBtn.disabled = true;
        getBtn.textContent = "处理中...";
        status.textContent = "🔍 校验 IID...";

        const raw = iidInput.value.trim();
        const iid = raw.replace(/[^0-9]/g, "");

        if (!iid) {
            toast("❌ 请输入有效的 IID");
            throw new Error("IID 为空");
        }

        // ✅ 启用你要的区块校验
        const check = validateIID(iid);
        if (!check.valid) {
            if (check.error === "not_numeric") {
                toast("❌ IID 只能是纯数字");
            } else if (check.error === "invalid_length") {
                toast("❌ IID 必须是 54/63 位");
            } else if (check.failedBlocks.length > 0) {
                const bad = check.failedBlocks.map(b => `第${b.index}块: ${b.value}`).join(" ");
                toast("❌ IID 区块错误：" + bad);
            }
            throw new Error("IID 校验失败");
        }

        status.textContent = "📡 发送请求中...";

        const res = await fetch(PROXY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ IID: iid })
        });

        const result = await res.json();

        if (!res.ok) {
            throw new Error(result.error || "请求失败");
        }

        resultBox.value = JSON.stringify(result, null, 2);
        copyBtn.disabled = false;
        toast("✅ 获取成功！");
        status.textContent = "✅ 完成";

    } catch (err) {
        toast("❌ 错误：" + err.message);
        status.textContent = "❌ 失败";
        console.error(err);
    } finally {
        getBtn.disabled = false;
        getBtn.textContent = "获取确认 ID";
    }
});

copyBtn.addEventListener("click", () => {
    resultBox.select();
    navigator.clipboard.writeText(resultBox.value).then(() => {
        toast("📋 已复制到剪贴板");
    });
});
</script>

</body>
</html>
