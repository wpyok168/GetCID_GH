<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Activation Helper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            width: 100%;
            max-width: 620px;
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #111;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #0078d4;
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
        }

        /* 按钮行：获取 2/3，清空 1/3 */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-get {
            flex: 2;
            background: #0078d4;
            color: #fff;
        }

        .btn-get:hover {
            background: #006fc0;
        }

        .btn-get:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .btn-clear {
            flex: 1;
            background: #f1f3f5;
            color: #444;
        }

        .btn-clear:hover {
            background: #e4e7ed;
        }

        .status {
            text-align: center;
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        .result-box {
            min-height: 420px;
            font-family: Consolas, monospace;
            font-size: 13px;
            background: #fafafa;
        }

        .btn-copy {
            width: 100%;
            background: #1e293b;
            color: #fff;
            margin-top: 16px;
        }

        .btn-copy:hover {
            background: #111827;
        }

        .btn-copy:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        /* 提示 */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(40px);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

<div class="card">
    <div class="title">微软确认 ID 获取工具</div>
    <div class="subtitle">Microsoft Confirmation ID Tool</div>

    <div class="form-group">
        <label>IID 安装 ID</label>
        <textarea id="iidInput" rows="4" placeholder="请粘贴 54 位或 63 位纯数字 IID"></textarea>
    </div>

    <div class="btn-row">
        <button class="btn btn-get" id="getBtn">获取确认 ID</button>
        <button class="btn btn-clear" id="clearBtn">清空</button>
    </div>

    <div class="status" id="status">✅ 就绪</div>

    <div class="form-group">
        <label>返回结果</label>
        <textarea readonly class="result-box" id="resultBox" placeholder="结果将显示在这里"></textarea>
    </div>

    <button class="btn btn-copy" id="copyBtn" disabled>复制结果</button>
</div>

<div class="toast" id="toast"></div>

<script>
const PROXY_URL = "https://msc.x2ray.cfd/";

const $ = id => document.getElementById(id);
const iidInput = $("iidInput");
const getBtn = $("getBtn");
const clearBtn = $("clearBtn");
const resultBox = $("resultBox");
const copyBtn = $("copyBtn");
const status = $("status");
const toast = $("toast");

function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2200);
}

// 清空
clearBtn.addEventListener("click", () => {
    iidInput.value = "";
    resultBox.value = "";
    copyBtn.disabled = true;
    status.textContent = "✅ 就绪";
    showToast("🗑️ 已清空");
});

// 获取
getBtn.addEventListener("click", async () => {
    try {
        getBtn.disabled = true;
        getBtn.textContent = "处理中...";
        status.textContent = "🔍 校验 IID...";

        const raw = iidInput.value.trim();
        const iid = raw.replace(/[^0-9]/g, "");

        if (!iid) {
            showToast("❌ 请输入 IID");
            throw new Error("为空");
        }
        if (iid.length !== 54 && iid.length !== 63) {
            showToast("❌ 必须 54/63 位");
            throw new Error("长度错误");
        }

        status.textContent = "📡 请求中...";

        const res = await fetch(PROXY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ IID: iid })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "请求失败");

        resultBox.value = JSON.stringify(data, null, 2);
        copyBtn.disabled = false;
        status.textContent = "✅ 获取成功";
        showToast("✅ 成功");

    } catch (e) {
        status.textContent = "❌ 失败";
        resultBox.value = "错误：" + e.message;
        showToast("❌ " + e.message);
    } finally {
        getBtn.disabled = false;
        getBtn.textContent = "获取确认 ID";
    }
});

// 复制
copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(resultBox.value).then(() => {
        showToast("📋 已复制");
    });
});
</script>

</body>
</html>
